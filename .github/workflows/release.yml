name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: ghostit-macos-intel
          - target: aarch64-apple-darwin
            os: macos-latest
            name: ghostit-macos-arm
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: ghostit-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: ghostit-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz ghostit
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz

      - name: Generate checksums
        id: checksums
        run: |
          echo "macos_arm=$(shasum -a 256 artifacts/ghostit-macos-arm/ghostit-macos-arm.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "macos_intel=$(shasum -a 256 artifacts/ghostit-macos-intel/ghostit-macos-intel.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_x86_64=$(shasum -a 256 artifacts/ghostit-linux-x86_64/ghostit-linux-x86_64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(shasum -a 256 artifacts/ghostit-linux-arm64/ghostit-linux-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          cat > /tmp/ghostit.rb <<FORMULA
          class Ghostit < Formula
            desc "Encrypt any folder on your drive. No account. No server. Your key, your data."
            homepage "https://github.com/neuromance-admin/ghostit"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/neuromance-admin/ghostit/releases/download/${TAG}/ghostit-macos-arm.tar.gz"
                sha256 "${{ steps.checksums.outputs.macos_arm }}"
              else
                url "https://github.com/neuromance-admin/ghostit/releases/download/${TAG}/ghostit-macos-intel.tar.gz"
                sha256 "${{ steps.checksums.outputs.macos_intel }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/neuromance-admin/ghostit/releases/download/${TAG}/ghostit-linux-arm64.tar.gz"
                sha256 "${{ steps.checksums.outputs.linux_arm64 }}"
              else
                url "https://github.com/neuromance-admin/ghostit/releases/download/${TAG}/ghostit-linux-x86_64.tar.gz"
                sha256 "${{ steps.checksums.outputs.linux_x86_64 }}"
              end
            end

            def install
              bin.install "ghostit"
            end

            test do
              assert_match "ghostit #{version}", shell_output("#{bin}/ghostit --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/ghostit.rb

          gh api repos/neuromance-admin/homebrew-tap/contents/Formula/ghostit.rb \
            --method PUT \
            --field message="Update GhostIT to ${TAG}" \
            --field content="$(base64 -w0 /tmp/ghostit.rb)" \
            --field sha="$(gh api repos/neuromance-admin/homebrew-tap/contents/Formula/ghostit.rb --jq '.sha')"
